<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerology AI Elite</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL FIX ===== */
*{box-sizing:border-box;}

body{
 margin:0;
 font-family:Segoe UI;
 background:#020617;
 color:#fff;
 display:flex;
 justify-content:center;
 align-items:flex-start;
 min-height:100vh;
 overflow-x:hidden;
}

/* ===== FRAME ===== */
.frame{
 width:100%;
 max-width:100%;
 margin:10px;
 padding:10px;
 border-radius:20px;
 border:1px solid rgba(255,255,255,.15);
}

/* ===== CONTAINER ===== */
.container{
 width:100%;
 max-width:100%;
 padding:15px;
 border-radius:15px;
 background:rgba(255,255,255,.05);
 display:flex;
 flex-direction:column;
 align-items:center;
}

/* ===== GRID ===== */
.form-grid{
 width:100%;
 display:grid;
 grid-template-columns:1fr;
 gap:10px;
}

@media(min-width:768px){
 .form-grid{
  grid-template-columns:1fr 1fr;
 }
 .form-grid button{
  grid-column:span 2;
 }
}

/* ===== INPUTS ===== */
input,select,button{
 width:100%;
 height:50px;
 border-radius:8px;
 border:1px solid rgba(255,255,255,.2);
 background:rgba(255,255,255,.05);
 color:#fff;
 padding:0 10px;
}

button{
 background:#22c55e;
 color:#000;
 font-weight:bold;
 cursor:pointer;
}

/* ===== CARDS ===== */
.card{
 width:100%;
 margin-top:10px;
 padding:12px;
 background:#0f172a;
 border-radius:10px;
 word-wrap:break-word;
 overflow-wrap:break-word;
 font-size:14px;
 line-height:1.5;
}

/* ===== CHART ===== */
canvas{
 width:100% !important;
 max-width:100%;
 height:200px !important;
 margin-top:10px;
}

</style>
</head>

<body>

<div class="frame">
<div class="container">

<h2>🔮 Numerology AI Elite</h2>

<div class="form-grid">
<input id="name" placeholder="Name / Number / Mixed">
<input type="date" id="dob">

<select id="style">
<option value="spiritual">Spiritual AI</option>
<option value="scientific">Scientific AI</option>
<option value="business">Business AI</option>
</select>

<button onclick="run()">Generate Full Report</button>
</div>

<div id="out"></div>
<canvas id="chart"></canvas>

</div>
</div>

<script>

// ===== MAP =====
const map = {
A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,
J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,
S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8
};

const meanings = {
1:"leadership",2:"balance",3:"creativity",4:"discipline",
5:"freedom",6:"responsibility",7:"spiritual growth",
8:"power",9:"completion"
};

// ===== CORE =====
function reduce(n){
 while(n>9 && ![11,22,33].includes(n)){
  n = n.toString().split('').reduce((a,b)=>a+ +b,0);
 }
 return n;
}

function clean(s){
 return s.toUpperCase().replace(/[^A-Z0-9]/g,'');
}

function calc(input){
 let total = 0;
 for(let c of clean(input)){
  if(map[c]) total += map[c];
  else if(!isNaN(c)) total += Number(c);
 }
 return {compound:total,single:reduce(total)};
}

// ===== DOB =====
function lifePath(d){
 if(!d) return null;
 let [y,m,da]=d.split('-');
 return reduce(
  reduce([...y].reduce((a,b)=>a+ +b,0)) +
  reduce([...m].reduce((a,b)=>a+ +b,0)) +
  reduce([...da].reduce((a,b)=>a+ +b,0))
 );
}

function personalYear(d){
 if(!d) return null;
 let [y,m,da]=d.split('-');
 let cy = new Date().getFullYear();
 return reduce(
  reduce(+m) +
  reduce(+da) +
  reduce([...cy.toString()].reduce((a,b)=>a+ +b,0))
 );
}

function personalMonth(py){
 return reduce(py + (new Date().getMonth()+1));
}

function personalDay(pm){
 return reduce(pm + new Date().getDate());
}

// ===== ELITE =====
function pinnacle(d){
 if(!d) return null;
 let [y,m,da]=d.split('-');

 let mR=reduce([...m].reduce((a,b)=>a+ +b,0));
 let dR=reduce([...da].reduce((a,b)=>a+ +b,0));
 let yR=reduce([...y].reduce((a,b)=>a+ +b,0));

 return [
  reduce(mR+dR),
  reduce(dR+yR),
  reduce(mR+yR),
  reduce(mR+dR+yR)
 ];
}

function challenge(d){
 if(!d) return null;
 let [y,m,da]=d.split('-');

 let mR=reduce([...m].reduce((a,b)=>a+ +b,0));
 let dR=reduce([...da].reduce((a,b)=>a+ +b,0));
 let yR=reduce([...y].reduce((a,b)=>a+ +b,0));

 return [
  Math.abs(mR-dR),
  Math.abs(dR-yR),
  Math.abs(mR-yR),
  Math.abs(Math.abs(mR-dR)-Math.abs(dR-yR))
 ];
}

function lucky(n){
 let arr=[];
 for(let i=1;i<=31;i++){
  if(reduce(i)==n) arr.push(i);
 }
 return arr.join(', ');
}

// ===== AI =====
function aiReport(lp,py,pm,pd,pin,chal,style){

if(style==="scientific"){
 return `Cycle ${py} indicates ${meanings[py]}. Month ${pm} modifies behavior. Day ${pd} influences decisions. Life Path ${lp} defines personality. Pinnacles (${pin}) show phases. Challenges (${chal}) show constraints.`;
}

if(style==="business"){
 return `Year ${py} = strategy. Month ${pm} = execution. Day ${pd} = action timing. Life Path ${lp} = strengths. Pinnacles (${pin}) = career phases. Challenges (${chal}) = risks.`;
}

return `You are in Year ${py}, guiding your soul toward ${meanings[py]}. Month ${pm} brings ${meanings[pm]}. Day ${pd} offers opportunity. Life Path ${lp} defines your purpose. Pinnacles (${pin}) show your journey. Challenges (${chal}) are lessons.`;
}

function predictions(num){
 return {
  love:`Love energy shows ${meanings[num]}. Relationships grow through communication.`,
  career:`Career shows ${meanings[num]}. Focus on steady progress.`,
  money:`Money energy shows ${meanings[num]}. Avoid impulsive decisions.`
 };
}

// ===== MAIN =====
function run(){

let name = document.getElementById("name").value.trim();
let dob = document.getElementById("dob").value;
let style = document.getElementById("style").value;

if(!name){
 alert("Enter Name or Number");
 return;
}

let r = calc(name);
let main = r.single;

// SAFE HANDLING
let lp = dob ? lifePath(dob) : null;
let py = dob ? personalYear(dob) : null;
let pm = py ? personalMonth(py) : null;
let pd = pm ? personalDay(pm) : null;
let pin = dob ? pinnacle(dob) : [];
let chal = dob ? challenge(dob) : [];

let html = "";

// OUTPUT
html += `<div class='card'><b>Main Number:</b> ${main}</div>`;

if(lp) html += `<div class='card'>Life Path: ${lp}</div>`;

if(py){
 html += `<div class='card'>Year: ${py}<br>Month: ${pm}<br>Day: ${pd}</div>`;
}

if(pin.length){
 html += `<div class='card'>Pinnacles: ${pin.join(', ')}</div>`;
}

if(chal.length){
 html += `<div class='card'>Challenges: ${chal.join(', ')}</div>`;
}

html += `<div class='card'>Lucky Dates: ${lucky(main)}</div>`;

// AI + Predictions
let ai = aiReport(lp || main, py || main, pm || main, pd || main, pin, chal, style);
let p = predictions(main);

html += `<div class='card'><b>AI (${style})</b><br>${ai}</div>`;
html += `<div class='card'><b>Love ❤️</b><br>${p.love}</div>`;
html += `<div class='card'><b>Career 💼</b><br>${p.career}</div>`;
html += `<div class='card'><b>Money 💰</b><br>${p.money}</div>`;

// RENDER
document.getElementById("out").innerHTML = html;

// SAFE CHART
try{
 new Chart(document.getElementById("chart"),{
  type:'bar',
  data:{
   labels:['Energy'],
   datasets:[{data:[main]}]
  }
 });
}catch(e){}

}

</script>

</body>
</html>
